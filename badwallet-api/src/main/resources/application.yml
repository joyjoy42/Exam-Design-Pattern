server:
  port: 8080

spring:
  application:
    name: badwallet-api
  datasource:
    url: jdbc:h2:mem:walletdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

payment-service:
  base-url: http://localhost:8081

logging:
  level:
    com.badwallet.api: INFO
